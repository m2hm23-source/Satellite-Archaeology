<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مستعرض الخرائط المتكامل</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>

  <style>
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    
    #mainWrapper { width: 100%; height: calc(100% - 150px); display: flex; border: 4px solid #333; box-sizing: border-box; }
    
    #cesiumContainer { flex: 1; position: relative; height: 100%; border-left: 3px solid #333; background: #000; }
    #sidePanel { flex: 1; height: 100%; position: relative; background: #000; overflow: hidden; }

    #analysisPanel {
        width: 100%;
        height: 150px;
        background: #222;
        color: #00d2ff;
        padding: 15px;
        box-sizing: border-box;
        border: 4px solid #333;
        border-top: none;
        resize: none;
        font-family: sans-serif;
        font-size: 16px;
        line-height: 1.6;
    }

    .fs-btn { 
        position: absolute; bottom: 15px; right: 15px; z-index: 2000; 
        cursor: pointer; background: transparent; border: 1px solid rgba(255,255,255,0.5); 
        color: white; padding: 5px 12px; border-radius: 4px; font-size: 20px; 
    }
    .fs-btn:hover { background: rgba(255,255,255,0.2); }

    .main-title { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; font-family: sans-serif; font-size: 32px; color: #fff; text-shadow: 0 0 5px #00d2ff, 0 0 10px #00d2ff; pointer-events: none; }
    
    #layerControlPanel { position: absolute; top: 10px; left: 10px; background: rgba(255, 255, 255, 0.7); padding: 15px; border-radius: 12px; z-index: 999; }
    .opacity-btn { padding: 5px 10px; cursor: pointer; font-weight: bold; border-radius: 4px; border: 1px solid #999; background: #fff; }
    #layersList { margin-top: 10px; max-height: 250px; overflow-y: auto; }
    .layer-item { cursor: pointer; padding: 8px; border-bottom: 1px solid #ddd; background: #eee; margin-bottom: 2px; border-radius: 4px; transition: 0.3s; }
    .layer-item:hover { background: #ddd; }

    .gif-box { position: absolute; width: 80px; height: 80px; z-index: 10; pointer-events: none; }
    #myUniqueGif { width: 130px !important; height: 80px !important; }
    .gif-img { width: 100%; height: 100%; object-fit: cover; }
    .top-left { top: 0; left: 0; } .bottom-left { bottom: 0; left: 0; }
    .top-right { top: 0; right: 0; } .bottom-right { bottom: 0; right: 0; }
    
    .sketchfab-embed-wrapper { width: 100%; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>

<div id="mainWrapper">
    <div id="cesiumContainer">
        <h1 class="main-title">Satellite Archaeology</h1>
        <button class="fs-btn" onclick="toggleElementFS('cesiumContainer')">⛶</button>
        <div id="layerControlPanel">
            <div style="margin-bottom: 10px; text-align: center;">
                <label style="font-weight:bold; display:block; margin-bottom:5px;">الشفافية:</label>
                <button class="opacity-btn" onclick="changeOpacity(-0.1)">▼</button>
                <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="1" style="width: 80px; margin: 0 5px;">
                <button class="opacity-btn" onclick="changeOpacity(0.1)">▲</button>
                <div id="opacityVal" style="font-size: 12px; margin-top:5px;">100%</div>
            </div>
            <div id="layersList"><label style="font-weight:bold;">اختر طبقة:</label></div>
        </div>
    </div>

    <div id="sidePanel">
        <button class="fs-btn" onclick="toggleElementFS('sidePanel')">⛶</button>
        <div class="gif-box top-left" id="myUniqueGif"><img src="2.gif" class="gif-img"></div>
        <div class="gif-box bottom-left"><img src="3.gif" class="gif-img"></div>
        <div class="gif-box top-right"><img src="1.gif" class="gif-img"></div>
        <div class="gif-box bottom-right"><img src="4.gif" class="gif-img"></div>
        <h1 class="main-title">Satellite Archaeology</h1>
        <div class="sketchfab-embed-wrapper">
            <iframe id="modelFrame" title="Map" src="https://sketchfab.com/models/15537c057e24415ea763595f1b35f2f4/embed" allowfullscreen> </iframe>
        </div>
    </div>
</div>

<textarea id="analysisPanel" readonly placeholder="فعل علامة الصح لعرض التحليل والنموذج..."></textarea>

<script>
  const layerAnalysis = {
    "Object ID 11": { text: "تحليل Object ID 11 هنا...", url: "https://sketchfab.com/models/15537c057e24415ea763595f1b35f2f4/embed" },
    "Object ID 18": { text: "تحليل Object ID 18 هنا...", url: "https://sketchfab.com/models/رابط_آخر/embed" }
  };

  function toggleElementFS(id) {
      let elem = document.getElementById(id);
      if (!document.fullscreenElement) elem.requestFullscreen();
      else document.exitFullscreen();
  }

  let currentOpacity = 1.0;
  let dataSourceGlobal = null;
  let viewer = null;

  Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI1NDM5NGYzOC04ODRmLTQ2MjAtODgxZi0wYTBkMDJkODQ4NTAiLCJpZCI6NDU0NjkwLCJzdWIiOiJtMmhtMjMiLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoic2F2IiwiaWF0IjoxNzgzNjg2Nzk3fQ.kpHKV7FezJOHm8gb4zvzFaVQrms34Fg8PawnIzT2-UA';

  async function initializeMap() {
      try {
          viewer = new Cesium.Viewer('cesiumContainer', { baseLayerPicker: true, fullscreenButton: false });
          viewer.scene.screenSpaceCameraController.minimumZoomDistance = 50.0;
          
          const arcgisImageryProvider = await Cesium.ArcGisMapServerImageryProvider.fromUrl('https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer', { enablePickFeatures: false });
          viewer.imageryLayers.addImageryProvider(arcgisImageryProvider);

          const kmzResponse = await fetch('1.kmz?v=' + new Date().getTime());
          const kmzBlob = await kmzResponse.blob();
          const zip = await JSZip.loadAsync(kmzBlob);
          const kmlFile = Object.keys(zip.files).find(name => name.endsWith('.kml'));
          let kmlText = await zip.files[kmlFile].async('string');
          const imagesInZip = Object.keys(zip.files).filter(name => name.toLowerCase().endsWith('.tif'));
          const imageMap = {};

          for (let imgName of imagesInZip) {
              const tifBuffer = await zip.files[imgName].async('arraybuffer');
              const tiff = await GeoTIFF.fromArrayBuffer(tifBuffer);
              const image = await tiff.getImage();
              const rgb = await image.readRGB({ interleave: true });
              const canvas = document.createElement('canvas');
              canvas.width = image.getWidth(); canvas.height = image.getHeight();
              const ctx = canvas.getContext('2d');
              const imgData = ctx.createImageData(canvas.width, canvas.height);
              let j = 0;
              for (let i = 0; i < rgb.length; i += 3) {
                  imgData.data[j] = rgb[i]; imgData.data[j+1] = rgb[i+1]; imgData.data[j+2] = rgb[i+2];
                  imgData.data[j+3] = (rgb[i] === 0 && rgb[i+1] === 0 && rgb[i+2] === 0) ? 0 : 255;
                  j += 4;
              }
              ctx.putImageData(imgData, 0, 0);
              imageMap[imgName] = canvas.toDataURL('image/png');
          }
          for (let originalName in imageMap) { kmlText = kmlText.split(originalName).join(imageMap[originalName]); }

          const parser = new DOMParser();
          const kmlDocument = parser.parseFromString(kmlText, 'text/xml');
          dataSourceGlobal = await Cesium.KmlDataSource.load(kmlDocument, { camera: viewer.camera, canvas: viewer.canvas, clampToGround: true });
          viewer.dataSources.add(dataSourceGlobal);
          
          const layersList = document.getElementById('layersList');
          const analysisPanel = document.getElementById('analysisPanel');
          const modelFrame = document.getElementById('modelFrame');

          dataSourceGlobal.entities.values.forEach((ent) => {
              if(ent.rectangle) {
                  let layerName = ent.name || "طبقة";
                  let div = document.createElement('div');
                  div.className = "layer-item";
                  div.innerHTML = `<input type="checkbox" checked> ${layerName}`;
                  
                  // الربط أصبح هنا فقط عند تغير علامة الصح
                  div.querySelector('input').addEventListener('change', (e) => {
                      ent.show = e.target.checked;
                      if (e.target.checked && layerAnalysis[layerName]) {
                          analysisPanel.value = layerAnalysis[layerName].text;
                          modelFrame.src = layerAnalysis[layerName].url;
                      }
                  });

                  div.onclick = null; // إيقاف الضغط على اسم الطبقة
                  layersList.appendChild(div);
              }
          });

          document.getElementById('opacitySlider').addEventListener('input', (e) => { updateOpacity(parseFloat(e.target.value)); });
          if (dataSourceGlobal.entities.values.length > 0) viewer.flyTo(dataSourceGlobal.entities.values[1] || dataSourceGlobal.entities.values[0], { duration: 3.0, offset: new Cesium.HeadingPitchRange(0, Cesium.Math.toRadians(-90), 50.0) });
      } catch (error) { console.error(error); }
  }

  function updateOpacity(val) { currentOpacity = val; document.getElementById('opacityVal').innerText = Math.round(currentOpacity * 100) + "%"; document.getElementById('opacitySlider').value = currentOpacity; if(dataSourceGlobal) { dataSourceGlobal.entities.values.forEach(ent => { if(ent.rectangle) ent.rectangle.material.color = Cesium.Color.WHITE.withAlpha(currentOpacity); }); } }
  window.changeOpacity = (delta) => { updateOpacity(Math.min(Math.max(currentOpacity + delta, 0), 1)); };

  initializeMap();
</script>
</body>
