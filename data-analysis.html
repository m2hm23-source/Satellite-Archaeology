<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Satellite Archaeology</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('sa.gif') no-repeat center center fixed; /* خلفية متحركة */
      background-size: cover;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* اسم الموقع */
    .site-name a {
      font-size: 65px;
      font-weight: bold;
      color: #00aaff;
      text-decoration: none;
      animation: neon 2s ease-in-out infinite alternate;
    }
    @keyframes neon {
      from { text-shadow: 0 0 20px #00aaff, 0 0 40px #33ccff; }
      to { text-shadow: 0 0 40px #66ffff, 0 0 60px #00aaff; }
    }

    /* العنوان */
    .main-title {
      font-size: 45px;
      margin: 20px 0;
      text-shadow: 0 0 15px lightblue;
    }

    /* الحاوية */
    .top-section {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
      padding: 0 40px;
      box-sizing: border-box;
    }

    /* المربعات */
    .square-box {
      width: 280px;
      min-height: 280px;
      border-radius: 12px;
      border: 3px solid lightblue;
      background: rgba(0,0,0,0.6);
      padding: 20px;
      text-align: center;
      animation: fadeText 3s infinite;
    }
    @keyframes fadeText {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
    .term-text {
      font-size: 26px; /* أكبر */
      font-weight: bold;
      color: #fff;
    }
    .definition {
      font-size: 20px; /* أكبر */
      margin-top: 10px;
      color: #ddd;
      font-weight: normal;
    }

    /* فورم تسجيل الدخول */
    .login-box {
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      border: 2px solid #00aaff;
      margin: 0 20px;
    }
    .login-box input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }
    .login-box button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #00aaff;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      color: white;
    }
    .login-box button:hover { background: #0077cc; }

    /* لماذا نحن */
    .why-us {
      margin-top: 30px;
      background: rgba(0,0,0,0.7);
      padding: 20px;
      border-radius: 12px;
      width: 80%;
      text-align: center;
      font-size: 20px;
    }
    .why-us h3 { color: lightblue; font-size: 26px; }
  </style>
</head>
<body>
  <!-- اسم الموقع -->
  <div class="site-name">
    <a href="001.html">Satellite Archaeology</a>
  </div>

  <!-- العنوان -->
  <h1 class="main-title">تحليل البيانات</h1>

  <!-- المربعات + فورم -->
  <div class="top-section">
    <!-- مربع يمين -->
    <div class="square-box" id="steps-box">
      <div class="term-text" id="steps-text"></div>
      <div class="definition" id="steps-def"></div>
    </div>

    <!-- فورم تسجيل الدخول -->
    <div class="login-box">
      <h3>تسجيل الدخول</h3>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()">دخول</button>
    </div>

    <!-- مربع شمال -->
    <div class="square-box" id="terms-box">
      <div class="term-text" id="terms-text"></div>
      <div class="definition" id="terms-def"></div>
    </div>
  </div>

  <!-- لماذا نحن -->
  <div class="why-us">
    <h3>لماذا نحن؟</h3>
    <p>لأننا نمزج بين أحدث تقنيات الفضاء الأثري (SAR، LiDAR، GIS) مع خبرة طويلة في التحليل المكاني والهندسة العكسية.</p>
    <p>نقدم حلول دقيقة وموثوقة للباحثين والمؤسسات، مع دعم فني مستمر وخدمة عملاء متميزة.</p>
  </div>

  <script>
    const steps = [
      {text:"جمع البيانات", def:"الحصول على الصور والقياسات العامة"},
      {text:"دمج البيانات", def:"توحيد المصادر المختلفة"},
      {text:"معالجة البيانات", def:"تنظيف وتحسين القيم"},
      {text:"تحليل البيانات", def:"استخراج الأنماط والعلاقات"},
      {text:"عرض النتائج", def:"خرائط ورسوم بيانية"}
    ];

    const terms = [
      {text:"Multi-Source Spatial Analysis", def:"تحليل مكاني متعدد المصادر"},
      {text:"Remote Sensing", def:"الاستشعار عن بعد"},
      {text:"SAR", def:"رادار الفتحة الاصطناعية"},
      {text:"LiDAR", def:"قياس المسافات بالليزر"},
      {text:"GIS", def:"نظم المعلومات الجغرافية"}
    ];

    let stepIndex = 0;
    let termIndex = 0;

    function cycleText() {
      document.getElementById("steps-text").innerText = steps[stepIndex].text;
      document.getElementById("steps-def").innerText = steps[stepIndex].def;
      stepIndex = (stepIndex + 1) % steps.length;

      document.getElementById("terms-text").innerText = terms[termIndex].text;
      document.getElementById("terms-def").innerText = terms[termIndex].def;
      termIndex = (termIndex + 1) % terms.length;
    }

    cycleText();
    setInterval(cycleText, 3000);

    const users = {
      "mohamed": { password: "1234", page: "mohamed.html" },
      "ahmed":   { password: "5678", page: "ahmed.html" },
      "sara":    { password: "abcd", page: "sara.html" },
      "admin":   { password: "admin", page: "admin.html" }
    };

    function login() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();

      if(users[user] && users[user].password === pass) {
        window.location.href = users[user].page;
      } else {
        alert("اسم المستخدم أو كلمة المرور غير صحيحة");
      }
    }
  </script>
</body>
</html>
