    .universal-player-bottom-panel, .universal-player-bottom-controls, 
    .bottom-panel-wrapper, div[class*="bottom-panel"],

<script>
(function() {
    document.addEventListener("DOMContentLoaded", function() {
        // حلقة فحص لضمان بقاء العنوان والأيقونات
        var fixInterface = setInterval(function() {
            var topBar = document.querySelector('.ispring-viewer-header') || document.body;
            var existingContainer = document.getElementById('sav-main-container');

            if (!existingContainer && topBar) {
                var container = document.createElement('div');
                container.id = 'sav-main-container';
                container.style.cssText = `
                    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
                    z-index: 999999; display: flex; align-items: center; gap: 15px;
                    background: #000; padding: 5px 15px; border-radius: 5px; 
                    border: 1px solid #333; pointer-events: auto;
             
        // إيقاف الفحص بعد فترة لضمان الأداء
        setTimeout(function() { clearInterval(fixInterface); }, 10000);
    });
})();
</script>
<script>
    (function() {
        var password = "123"; // ضع كلمة المرور هنا
        var entered = sessionStorage.getItem('full_access');

        if (entered !== 'true') {
            document.documentElement.style.display = 'none'; // إخفاء الصفحة تماماً
            
            var pass = prompt("الرجاء إدخال كلمة المرور لدخول البرنامج:");
            
            if (pass === password) {
                sessionStorage.setItem('full_access', 'true');
                document.documentElement.style.display = 'block'; // إظهار الصفحة
            } else {
                alert("كلمة مرور خاطئة. سيتم إغلاق الصفحة.");
                window.location.href = "about:blank"; // إغلاق الصفحة
            }
        }
    })();
</body>
