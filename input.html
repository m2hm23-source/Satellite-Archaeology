<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Satellite Archaeology - Data Entry</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; position: relative; z-index: 9999; }
    </style>
</head>
<body>
    <h3>نظام إدخال البيانات الميدانية</h3>
    <!-- الزر يستدعي الدالة مباشرة -->
    <button id="uploadBtn" onclick="sendData()">تأكيد وإرسال البيانات</button>
    <p id="status"></p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNAQejAeB5qRjxT_Q9DFg63je2zJ2zQwI",
            authDomain: "satellite-archaeology-5078d.firebaseapp.com",
            projectId: "satellite-archaeology-5078d",
            storageBucket: "satellite-archaeology-5078d.firebasestorage.app",
            messagingSenderId: "614439406772",
            appId: "1:614439406772:web:2521c50961a245dd4fdbe1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // جعل الدالة متاحة عالمياً ليتمكن الزر من الوصول إليها
        window.sendData = async function() {
            const statusEl = document.getElementById('status');
            statusEl.innerText = "جاري الإرسال...";
            console.log("بدأت عملية الإرسال...");

            try {
                // استخدام الطريقة الصحيحة للمكتبة (addDoc)
                await addDoc(collection(db, "archaeological_data"), {
                    timestamp: new Date(),
                    status: "تم الرصد"
                });
                
                statusEl.innerText = "تم الإرسال بنجاح إلى Firebase!";
                console.log("تم الإرسال بنجاح!");
                alert("تم الإرسال!");
                
            } catch (error) {
                statusEl.innerText = "حدث خطأ: " + error.message;
                console.error("حدث خطأ أثناء الإرسال:", error);
            }
        };
    </script>
</body>
</html>
